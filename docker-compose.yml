services:
  postgres:
    image: postgres:16-alpine
    container_name: anovastudio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: strapi
      POSTGRES_USER: strapi
      POSTGRES_PASSWORD: strapi_dev_password
    # Host port 5433 (not the default 5432) so this dedicated Anova database
    # coexists with the shared next-step-pro dev Postgres that other local
    # projects (e.g. climbing-hub) keep on 5432. Container-internal port stays
    # 5432; backend/.env sets DATABASE_PORT=5433 to match the host mapping.
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
